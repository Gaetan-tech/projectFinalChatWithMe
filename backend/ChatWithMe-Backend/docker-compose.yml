version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chat_mongodb
    restart: always
    ports:
      - "27017:27017"
    # Pas d'authentification pour simplifier
    volumes:
      - mongodb_data:/data/db
    networks:
      - chat_network

  chat_backend:
    build: .
    container_name: chat_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/chatapp
      - JWT_SECRET=votre_secret_jwt_tres_securise_changez_moi
    depends_on:
      - mongodb
    networks:
      - chat_network
    volumes:
      - .:/app
      - /app/node_modules

networks:
  chat_network:
    driver: bridge

volumes:
  mongodb_data: